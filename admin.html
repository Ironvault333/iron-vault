<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MOOWAVE Admin</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f6f8;
  color:#07111f;
}

header{
  background:#07111f;
  color:white;
  padding:24px 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:34px;
  font-weight:900;
  letter-spacing:4px;
}

.adminBadge{
  background:#0b70ff;
  padding:10px 16px;
  border-radius:999px;
  font-weight:900;
}

.loginPage{
  min-height:calc(100vh - 86px);
  display:grid;
  place-items:center;
  padding:30px;
}

.loginBox{
  width:100%;
  max-width:430px;
  background:white;
  border-radius:24px;
  padding:32px;
  box-shadow:0 12px 35px rgba(0,0,0,.12);
}

.loginBox h1{
  margin:0 0 12px;
  font-size:36px;
}

.loginBox p{
  color:#536273;
}

input,select,textarea{
  width:100%;
  padding:14px;
  border:1px solid #d7dce2;
  border-radius:12px;
  margin:8px 0 14px;
  font-size:15px;
}

textarea{
  min-height:90px;
  resize:vertical;
}

button{
  border:0;
  border-radius:12px;
  padding:13px 18px;
  font-weight:900;
  cursor:pointer;
  background:#0b70ff;
  color:white;
}

.darkBtn{
  background:#07111f;
}

.redBtn{
  background:#d62828;
}

.grayBtn{
  background:#6c757d;
}

.adminPage{
  display:none;
}

.wrapper{
  padding:35px 8%;
}

.grid{
  display:grid;
  grid-template-columns:380px 1fr;
  gap:28px;
}

.panel{
  background:white;
  border-radius:22px;
  padding:24px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.panel h2{
  margin-top:0;
}

.productList{
  display:grid;
  gap:18px;
}

.productCard{
  background:white;
  border-radius:18px;
  padding:20px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  display:grid;
  grid-template-columns:1fr auto;
  gap:18px;
  align-items:start;
}

.productCard h3{
  margin:0 0 8px;
}

.meta{
  color:#0b70ff;
  font-weight:900;
  font-size:13px;
  text-transform:uppercase;
}

.description{
  color:#536273;
  line-height:1.45;
}

.actions{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.topTools{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:22px;
}

.notice{
  background:#eaf4ff;
  color:#123a66;
  padding:14px;
  border-radius:14px;
  margin-bottom:18px;
  font-weight:700;
}

@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
  }

  header{
    flex-direction:column;
    gap:12px;
  }

  .productCard{
    grid-template-columns:1fr;
  }

  .actions{
    flex-direction:row;
    flex-wrap:wrap;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">MOOWAVE</div>
  <div class="adminBadge">ADMIN</div>
</header>

<section class="loginPage" id="loginPage">
  <div class="loginBox">
    <h1>Admin Access</h1>
    <p>Enter the admin code to manage MOOWAVE products.</p>
    <input type="password" id="adminPassword" placeholder="Enter admin code">
    <button class="darkBtn" onclick="login()">Unlock Admin</button>
    <p id="loginError" style="color:#d62828;font-weight:900;"></p>
  </div>
</section>

<section class="adminPage" id="adminPage">
  <div class="wrapper">

    <div class="notice">
      Admin access changed. Use code: <strong>moowave2026</strong>
    </div>

    <div class="topTools">
      <button onclick="newProduct()">New Product</button>
      <button class="grayBtn" onclick="exportProducts()">Export Products</button>
      <button class="redBtn" onclick="resetProducts()">Reset Products</button>
      <button class="darkBtn" onclick="logout()">Logout</button>
    </div>

    <div class="grid">

      <div class="panel">
        <h2>Product Editor</h2>

        <input type="hidden" id="editIndex">

        <label>Product Name</label>
        <input id="productName" placeholder="Product name">

        <label>Category</label>
        <input id="productCategory" placeholder="Sports, Games, Camping, etc.">

        <label>Price</label>
        <input id="productPrice" type="number" placeholder="Price">

        <label>Description</label>
        <textarea id="productDescription" placeholder="Product description"></textarea>

        <button onclick="saveProduct()">Save Product</button>
      </div>

      <div>
        <h2>Products</h2>
        <div class="productList" id="productList"></div>
      </div>

    </div>
  </div>
</section>

<script>
const ADMIN_CODE = "moowave2026";

let products = JSON.parse(localStorage.getItem("moowaveProducts")) || [
  {name:"Portable Pickleball Net Set",category:"Sports",price:89,description:"A quick setup backyard net for pickleball games at parks, driveways, and family events."},
  {name:"Glow Pickleball Paddle Set",category:"Sports",price:49,description:"A fun paddle set made for evening games, casual matches, and active outdoor play."},
  {name:"Basketball Return Trainer",category:"Sports",price:39,description:"Helps return made shots so players can practice shooting faster with less chasing."},
  {name:"Mini Basketball Arcade Game",category:"Sports",price:119,description:"A compact arcade-style game for bedrooms, basements, parties, and game rooms."},
  {name:"LED Basketball Hoop Light",category:"Sports",price:34,description:"Adds a bright glow to a hoop for nighttime shooting and backyard games."},
  {name:"Over Door Basketball Hoop",category:"Sports",price:29,description:"Easy indoor basketball hoop for rooms, offices, dorms, and quick mini games."},
  {name:"Soccer Rebound Net",category:"Sports",price:69,description:"Great for solo soccer practice, passing, shooting, and ball control training."},
  {name:"Baseball Swing Trainer",category:"Sports",price:44,description:"A useful practice tool for improving swings, timing, and hand-eye coordination."},
  {name:"Golf Chipping Practice Net",category:"Sports",price:39,description:"Portable golf net for practicing short chips in the backyard or garage."},
  {name:"Putting Mat Trainer",category:"Sports",price:54,description:"Indoor putting practice mat for improving aim, touch, and consistency."}
];

function login(){
  const entered = document.getElementById("adminPassword").value;

  if(entered === ADMIN_CODE){
    localStorage.setItem("moowaveAdminLoggedIn","yes");
    showAdmin();
  }else{
    document.getElementById("loginError").textContent = "Wrong admin code.";
  }
}

function showAdmin(){
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("adminPage").style.display = "block";
  displayProducts();
}

function logout(){
  localStorage.removeItem("moowaveAdminLoggedIn");
  location.reload();
}

function displayProducts(){
  const list = document.getElementById("productList");
  list.innerHTML = "";

  products.forEach((product,index) => {
    const card = document.createElement("div");
    card.className = "productCard";

    card.innerHTML = `
      <div>
        <div class="meta">${product.category} • $${product.price}</div>
        <h3>${product.name}</h3>
        <div class="description">${product.description}</div>
      </div>

      <div class="actions">
        <button onclick="editProduct(${index})">Edit</button>
        <button class="redBtn" onclick="deleteProduct(${index})">Delete</button>
      </div>
    `;

    list.appendChild(card);
  });
}

function saveProduct(){
  const name = document.getElementById("productName").value.trim();
  const category = document.getElementById("productCategory").value.trim();
  const price = Number(document.getElementById("productPrice").value);
  const description = document.getElementById("productDescription").value.trim();
  const editIndex = document.getElementById("editIndex").value;

  if(!name || !category || !price || !description){
    alert("Fill out all product fields.");
    return;
  }

  const product = {name,category,price,description};

  if(editIndex === ""){
    products.push(product);
  }else{
    products[editIndex] = product;
  }

  saveToStorage();
  clearForm();
  displayProducts();
}

function editProduct(index){
  const product = products[index];

  document.getElementById("editIndex").value = index;
  document.getElementById("productName").value = product.name;
  document.getElementById("productCategory").value = product.category;
  document.getElementById("productPrice").value = product.price;
  document.getElementById("productDescription").value = product.description;

  window.scrollTo({top:0,behavior:"smooth"});
}

function deleteProduct(index){
  if(confirm("Delete this product?")){
    products.splice(index,1);
    saveToStorage();
    displayProducts();
  }
}

function newProduct(){
  clearForm();
  window.scrollTo({top:0,behavior:"smooth"});
}

function clearForm(){
  document.getElementById("editIndex").value = "";
  document.getElementById("productName").value = "";
  document.getElementById("productCategory").value = "";
  document.getElementById("productPrice").value = "";
  document.getElementById("productDescription").value = "";
}

function saveToStorage(){
  localStorage.setItem("moowaveProducts",JSON.stringify(products));
}

function exportProducts(){
  const output = JSON.stringify(products,null,2);
  navigator.clipboard.writeText(output);
  alert("Products copied to clipboard.");
}

function resetProducts(){
  if(confirm("Reset all admin products?")){
    localStorage.removeItem("moowaveProducts");
    location.reload();
  }
}

if(localStorage.getItem("moowaveAdminLoggedIn") === "yes"){
  showAdmin();
}
</script>

</body>
</html>
