<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Side Quests Admin</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f7efe6;color:#111}
header{height:58px;background:#080b10;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 8%;box-sizing:border-box}
.logo{font-size:25px;font-weight:900}
a{color:white;text-decoration:none;font-weight:900}
main{padding:35px 8%}
.card{background:white;border-radius:18px;padding:22px;margin-bottom:22px;box-shadow:0 8px 25px rgba(0,0,0,.08)}
input,textarea{width:100%;padding:12px;margin:8px 0 14px;border:1px solid #ccc;border-radius:10px;font-size:15px;box-sizing:border-box}
textarea{min-height:90px}
button{background:#111;color:white;border:0;border-radius:12px;padding:12px 18px;font-weight:900;cursor:pointer}
.danger{background:#b00020}
.yellow{background:#ffc400;color:#111}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.catBox{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.catLabel{background:#eee;border-radius:999px;padding:8px 12px;font-size:13px}
.product{border:1px solid #ddd;border-radius:14px;padding:15px;margin-top:14px}
.small{font-size:13px;color:#666}
</style>
</head>

<body>

<header>
  <div class="logo">Side Quests Admin</div>
  <a href="index.html">View Store</a>
</header>

<main>

<div class="card">
  <h2>Add / Manage Categories</h2>
  <input id="newCategory" placeholder="New category name">
  <button onclick="addCategory()">Add Category</button>
  <div id="categoryList"></div>
</div>

<div class="card">
  <h2>Add Product</h2>

  <div class="grid">
    <input id="productName" placeholder="Product name">
    <input id="productPrice" placeholder="Price">
  </div>

  <input id="productImage" placeholder="Image URL">
  <textarea id="productDescription" placeholder="Description"></textarea>

  <h3>Categories</h3>
  <p class="small">Check as many categories as you want.</p>
  <div id="categoryCheckboxes" class="catBox"></div>

  <h3>Search Keywords</h3>
  <p class="small">Add words people might search. Example: cleaning supplies, cleaner, scrub, brush, wash</p>
  <textarea id="productKeywords" placeholder="Search keywords"></textarea>

  <button class="yellow" onclick="addProduct()">Add Product</button>
</div>

<div class="card">
  <h2>Current Products</h2>
  <div id="productList"></div>
</div>

</main>

<script>
const defaultCategories=[
"Home","Kitchen","Pets","Car","Travel","Cleaning","Sports","Water","Games","Camping","Outdoor","Tools","Safety","Kids","Tech","Storage"
];

const defaultProducts=[
{id:1,name:"Water Basketball Hoop",price:"39.99",description:"A floating pool basketball hoop for summer games.",image:"https://images.unsplash.com/photo-1546519638-68e109498ffc?auto=format&fit=crop&w=800&q=80",categories:["Water","Sports","Games","Kids","Outdoor"],keywords:"pool swim floating basketball ball summer toy"},
{id:2,name:"Portable Cleaning Brush Kit",price:"19.99",description:"A compact brush kit for cleaning shoes, tools, gear, and tight spaces.",image:"https://images.unsplash.com/photo-1581578731548-c64695cc6952?auto=format&fit=crop&w=800&q=80",categories:["Cleaning","Home","Tools","Travel"],keywords:"clean cleaning cleaner supplies product scrub brush wash"},
{id:3,name:"Magnetic Cable Clips",price:"12.99",description:"Small clips that keep charging cables from falling behind desks.",image:"https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=800&q=80",categories:["Tech","Home","Storage"],keywords:"cord cable charger desk organize organizer"}
];

let savedCategories=JSON.parse(localStorage.getItem("categories"));
let savedProducts=JSON.parse(localStorage.getItem("products"));

let categories=Array.isArray(savedCategories)&&savedCategories.length?savedCategories:defaultCategories;
let products=Array.isArray(savedProducts)&&savedProducts.length?savedProducts:defaultProducts;

function saveData(){
  localStorage.setItem("categories",JSON.stringify(categories));
  localStorage.setItem("products",JSON.stringify(products));
}

function renderCategories(){
  let list=document.getElementById("categoryList");
  let boxes=document.getElementById("categoryCheckboxes");

  list.innerHTML="";
  boxes.innerHTML="";

  categories.forEach((cat,index)=>{
    list.innerHTML+=`
      <div class="product">
        <input value="${cat}" onchange="renameCategory(${index},this.value)">
        <button class="danger" onclick="deleteCategory(${index})">Delete Category</button>
      </div>
    `;

    boxes.innerHTML+=`
      <label class="catLabel">
        <input type="checkbox" value="${cat}" class="productCategoryBox"> ${cat}
      </label>
    `;
  });
}

function addCategory(){
  let name=document.getElementById("newCategory").value.trim();

  if(!name){
    alert("Enter a category name.");
    return;
  }

  if(categories.some(cat=>cat.toLowerCase()===name.toLowerCase())){
    alert("That category already exists.");
    return;
  }

  categories.push(name);
  document.getElementById("newCategory").value="";
  saveData();
  renderCategories();
  renderProducts();
}

function renameCategory(index,newName){
  newName=newName.trim();

  if(!newName){
    alert("Category cannot be blank.");
    renderCategories();
    return;
  }

  let oldName=categories[index];
  categories[index]=newName;

  products.forEach(product=>{
    if(Array.isArray(product.categories)){
      product.categories=product.categories.map(cat=>cat===oldName?newName:cat);
    }

    if(product.category===oldName){
      product.category=newName;
    }
  });

  saveData();
  renderCategories();
  renderProducts();
}

function deleteCategory(index){
  let category=categories[index];

  if(products.some(product=>getProductCategories(product).includes(category))){
    alert("This category is being used by a product. Remove it from products first.");
    return;
  }

  categories.splice(index,1);
  saveData();
  renderCategories();
  renderProducts();
}

function getCheckedCategories(){
  return Array.from(document.querySelectorAll(".productCategoryBox:checked")).map(box=>box.value);
}

function clearProductForm(){
  document.getElementById("productName").value="";
  document.getElementById("productPrice").value="";
  document.getElementById("productImage").value="";
  document.getElementById("productDescription").value="";
  document.getElementById("productKeywords").value="";
  document.querySelectorAll(".productCategoryBox").forEach(box=>box.checked=false);
}

function addProduct(){
  let name=document.getElementById("productName").value.trim();
  let price=document.getElementById("productPrice").value.trim();
  let image=document.getElementById("productImage").value.trim();
  let description=document.getElementById("productDescription").value.trim();
  let keywords=document.getElementById("productKeywords").value.trim();
  let selectedCategories=getCheckedCategories();

  if(!name||!price){
    alert("Product name and price are required.");
    return;
  }

  if(selectedCategories.length===0){
    alert("Choose at least one category.");
    return;
  }

  products.push({
    id:Date.now(),
    name,
    price,
    image,
    description,
    categories:selectedCategories,
    keywords
  });

  saveData();
  clearProductForm();
  renderProducts();
}

function getProductCategories(product){
  if(Array.isArray(product.categories)) return product.categories;
  if(product.category) return [product.category];
  return [];
}

function renderProducts(){
  let list=document.getElementById("productList");
  list.innerHTML="";

  if(products.length===0){
    list.innerHTML="<p>No products yet.</p>";
    return;
  }

  products.forEach((product,index)=>{
    let cats=getProductCategories(product);

    list.innerHTML+=`
      <div class="product">
        <h3>${product.name}</h3>
        <p><strong>Price:</strong> $${product.price}</p>
        <p><strong>Categories:</strong> ${cats.join(", ")}</p>
        <p><strong>Search Keywords:</strong> ${product.keywords||""}</p>
        <button onclick="editProduct(${index})">Edit</button>
        <button class="danger" onclick="deleteProduct(${index})">Delete</button>
      </div>
    `;
  });
}

function editProduct(index){
  let product=products[index];

  let name=prompt("Product name:",product.name);
  if(name===null) return;

  let price=prompt("Price:",product.price);
  if(price===null) return;

  let image=prompt("Image URL:",product.image||"");
  if(image===null) return;

  let description=prompt("Description:",product.description||"");
  if(description===null) return;

  let currentCats=getProductCategories(product).join(", ");
  let catsInput=prompt("Categories separated by commas:",currentCats);
  if(catsInput===null) return;

  let keywords=prompt("Search keywords:",product.keywords||"");
  if(keywords===null) return;

  let newCats=catsInput.split(",").map(cat=>cat.trim()).filter(Boolean);

  newCats.forEach(cat=>{
    if(!categories.includes(cat)){
      categories.push(cat);
    }
  });

  products[index]={
    ...product,
    name:name.trim(),
    price:price.trim(),
    image:image.trim(),
    description:description.trim(),
    categories:newCats,
    keywords:keywords.trim()
  };

  saveData();
  renderCategories();
  renderProducts();
}

function deleteProduct(index){
  if(!confirm("Delete this product?")) return;

  products.splice(index,1);
  saveData();
  renderProducts();
}

renderCategories();
renderProducts();
</script>

</body>
</html>
