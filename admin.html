<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iron Vault Admin</title>
<style>
body{font-family:Arial,sans-serif;background:#faf7f0;margin:0;color:#111}
header{padding:22px 8%;display:flex;justify-content:space-between;align-items:center;background:white}
.logo{font-weight:900;font-size:24px}
main{padding:30px 8%}
.card{background:white;border-radius:18px;padding:22px;margin-bottom:22px;box-shadow:0 8px 25px rgba(0,0,0,.08)}
input,select,textarea{width:100%;padding:12px;margin:8px 0 14px;border:1px solid #ccc;border-radius:10px;font-size:15px;box-sizing:border-box}
button{background:#111;color:white;border:0;border-radius:12px;padding:13px 20px;font-weight:900;cursor:pointer}
.danger{background:#b00020}
.row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.item{border:1px solid #ddd;border-radius:12px;padding:15px;margin-top:12px}
.small{color:#666;font-size:14px}
</style>
</head>
<body>

<header>
  <div class="logo">IRON VAULT ADMIN</div>
  <a href="index.html">View Store</a>
</header>

<main>

<div class="card">
  <h2>Add / Manage Categories</h2>
  <input id="categoryName" placeholder="New category name, example: Camping">
  <button onclick="addCategory()">Add Category</button>

  <div id="categoryList"></div>
</div>

<div class="card">
  <h2>Add Product</h2>

  <div class="row">
    <input id="productName" placeholder="Product name">
    <input id="productPrice" placeholder="Price, example: 24.99">
  </div>

  <select id="productCategory"></select>

  <input id="productImage" placeholder="Image URL">
  <textarea id="productDescription" placeholder="Product description"></textarea>

  <button onclick="addProduct()">Add Product</button>
</div>

<div class="card">
  <h2>Current Products</h2>
  <div id="productList"></div>
</div>

</main>

<script>
let categories = JSON.parse(localStorage.getItem("categories")) || [
  "Camping",
  "Water",
  "Sports",
  "Games",
  "Survival",
  "Outdoor"
];

let products = JSON.parse(localStorage.getItem("products")) || [];

function saveData(){
  localStorage.setItem("categories", JSON.stringify(categories));
  localStorage.setItem("products", JSON.stringify(products));
}

function renderCategories(){
  const list = document.getElementById("categoryList");
  const select = document.getElementById("productCategory");

  list.innerHTML = "";
  select.innerHTML = "";

  categories.forEach((cat, index) => {
    select.innerHTML += `<option value="${cat}">${cat}</option>`;

    list.innerHTML += `
      <div class="item">
        <input value="${cat}" onchange="editCategory(${index}, this.value)">
        <button class="danger" onclick="deleteCategory(${index})">Delete Category</button>
      </div>
    `;
  });
}

function addCategory(){
  const name = document.getElementById("categoryName").value.trim();

  if(!name){
    alert("Enter a category name.");
    return;
  }

  if(categories.some(c => c.toLowerCase() === name.toLowerCase())){
    alert("That category already exists.");
    return;
  }

  categories.push(name);
  document.getElementById("categoryName").value = "";
  saveData();
  renderCategories();
}

function editCategory(index, newName){
  newName = newName.trim();

  if(!newName){
    alert("Category name cannot be blank.");
    renderCategories();
    return;
  }

  const oldName = categories[index];
  categories[index] = newName;

  products = products.map(product => {
    if(product.category === oldName){
      product.category = newName;
    }
    return product;
  });

  saveData();
  renderCategories();
  renderProducts();
}

function deleteCategory(index){
  const category = categories[index];

  const used = products.some(product => product.category === category);

  if(used){
    alert("You cannot delete this category because products are using it. Move or delete those products first.");
    return;
  }

  categories.splice(index, 1);
  saveData();
  renderCategories();
}

function addProduct(){
  const name = document.getElementById("productName").value.trim();
  const price = document.getElementById("productPrice").value.trim();
  const category = document.getElementById("productCategory").value;
  const image = document.getElementById("productImage").value.trim();
  const description = document.getElementById("productDescription").value.trim();

  if(!name || !price || !category){
    alert("Product name, price, and category are required.");
    return;
  }

  products.push({
    id: Date.now(),
    name,
    price,
    category,
    image,
    description
  });

  document.getElementById("productName").value = "";
  document.getElementById("productPrice").value = "";
  document.getElementById("productImage").value = "";
  document.getElementById("productDescription").value = "";

  saveData();
  renderProducts();
}

function renderProducts(){
  const list = document.getElementById("productList");
  list.innerHTML = "";

  if(products.length === 0){
    list.innerHTML = `<p class="small">No products added yet.</p>`;
    return;
  }

  products.forEach((product, index) => {
    list.innerHTML += `
      <div class="item">
        <h3>${product.name}</h3>
        <p class="small">Category: ${product.category}</p>
        <p class="small">Price: $${product.price}</p>
        <button class="danger" onclick="deleteProduct(${index})">Delete Product</button>
      </div>
    `;
  });
}

function deleteProduct(index){
  products.splice(index, 1);
  saveData();
  renderProducts();
}

renderCategories();
renderProducts();
</script>

</body>
</html>
