<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iron Vault</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#faf7f0;
  color:#111;
}

header{
  padding:22px 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow:0 4px 18px rgba(0,0,0,.06);
}

.logo{
  font-weight:900;
  font-size:24px;
}

nav{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
}

input,select{
  padding:11px;
  border:1px solid #ccc;
  border-radius:10px;
  font-size:14px;
}

button{
  background:#111;
  color:white;
  border:0;
  border-radius:12px;
  padding:12px 18px;
  font-weight:900;
  cursor:pointer;
}

button:hover{
  opacity:.85;
}

.hero{
  min-height:70vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  padding:0 8%;
  gap:40px;
}

h1{
  font-size:72px;
  line-height:.9;
  margin:0 0 20px;
}

p{
  font-size:18px;
  color:#555;
}

.vaultBox{
  display:grid;
  place-items:center;
}

.lock{
  width:280px;
  height:330px;
  border-radius:30px;
  background:linear-gradient(145deg,#333,#111);
  position:relative;
  box-shadow:0 30px 70px rgba(0,0,0,.35);
}

.lock:before{
  content:"";
  position:absolute;
  width:150px;
  height:120px;
  border:26px solid #222;
  border-bottom:0;
  border-radius:90px 90px 0 0;
  top:-95px;
  left:39px;
}

.dial{
  width:120px;
  height:120px;
  background:radial-gradient(circle,#777,#222);
  border-radius:50%;
  position:absolute;
  top:80px;
  left:80px;
  box-shadow:inset 0 0 20px rgba(255,255,255,.25);
}

.dial:after{
  content:"";
  width:14px;
  height:45px;
  background:#ddd;
  position:absolute;
  top:18px;
  left:53px;
  border-radius:8px;
}

.shop{
  padding:40px 8%;
}

.shopTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:25px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:22px;
}

.card{
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
  transition:.2s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:14px;
  background:#eee;
}

.price{
  font-weight:900;
  font-size:20px;
}

.tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin:8px 0;
}

.tag{
  font-size:12px;
  background:#eee;
  padding:5px 8px;
  border-radius:999px;
}

.empty{
  background:white;
  padding:30px;
  border-radius:18px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.cartBox{
  position:fixed;
  right:25px;
  bottom:25px;
  background:white;
  border-radius:18px;
  padding:18px;
  width:300px;
  box-shadow:0 8px 30px rgba(0,0,0,.18);
  display:none;
  z-index:20;
}

.cartItem{
  border-bottom:1px solid #ddd;
  padding:8px 0;
}

.small{
  font-size:13px;
  color:#777;
}

a{
  color:#111;
  font-weight:900;
  text-decoration:none;
}

@media(max-width:800px){
  .hero{
    grid-template-columns:1fr;
    padding-top:50px;
  }

  h1{
    font-size:52px;
  }

  header{
    align-items:flex-start;
    gap:15px;
    flex-direction:column;
  }

  nav{
    width:100%;
  }

  nav input,nav select{
    width:100%;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">IRON VAULT</div>

  <nav>
    <input id="searchInput" placeholder="Search products..." oninput="renderProducts()">

    <select id="categoryFilter" onchange="renderProducts()">
      <option value="All">All Categories</option>
    </select>

    <button onclick="clearFilters()">Home</button>
    <button onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h1>Unlock Gear You’ll Actually Want</h1>
    <p>
      Interesting, useful, almost-need-to-have products for outdoors,
      water, games, survival, sports, and more.
    </p>
    <button onclick="document.getElementById('shop').scrollIntoView({behavior:'smooth'})">
      Shop Now
    </button>
  </div>

  <div class="vaultBox">
    <div class="lock">
      <div class="dial"></div>
    </div>
  </div>
</section>

<section class="shop" id="shop">
  <div class="shopTop">
    <h2>Products</h2>
  </div>

  <div id="productGrid" class="grid"></div>
</section>

<div class="cartBox" id="cartBox">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <h3>Total: $<span id="cartTotal">0.00</span></h3>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let categories = JSON.parse(localStorage.getItem("categories")) || [
  "Camping",
  "Water",
  "Sports",
  "Games",
  "Survival",
  "Outdoor",
  "Cleaning",
  "Tools"
];

let products = JSON.parse(localStorage.getItem("products")) || [
  {
    id:1,
    name:"Water Basketball Hoop",
    price:"39.99",
    image:"https://images.unsplash.com/photo-1546519638-68e109498ffc?auto=format&fit=crop&w=800&q=80",
    description:"Floating basketball hoop for pool games.",
    categories:["Water","Sports","Games","Outdoor"],
    keywords:"pool floating basketball hoop summer toy"
  },
  {
    id:2,
    name:"Campfire Starter Kit",
    price:"14.99",
    image:"https://images.unsplash.com/photo-1504851149312-7a075b496cc7?auto=format&fit=crop&w=800&q=80",
    description:"Compact fire starter kit for camping and emergencies.",
    categories:["Camping","Survival","Outdoor"],
    keywords:"fire starter camping survival emergency hiking"
  },
  {
    id:3,
    name:"Portable Cleaning Brush Set",
    price:"19.99",
    image:"https://images.unsplash.com/photo-1581578731548-c64695cc6952?auto=format&fit=crop&w=800&q=80",
    description:"Useful brush kit for cleaning gear, shoes, tools, and outdoor equipment.",
    categories:["Cleaning","Tools","Outdoor"],
    keywords:"cleaning supplies cleaner product brush scrub washing maintenance"
  }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const synonymGroups = [
  ["clean","cleaning","cleaner","supplies","supply","product","products","soap","wash","washing","scrub","brush","sanitize","sanitizer"],
  ["water","pool","swim","swimming","lake","beach","floating","float","splash"],
  ["camp","camping","tent","outdoor","outside","hiking","trail"],
  ["sport","sports","game","games","ball","basketball","football","soccer"],
  ["survival","emergency","prep","preparedness","safety"],
  ["tool","tools","gear","equipment","kit"],
  ["toy","toys","fun","kids","family"],
  ["light","lights","glow","led","bright"],
  ["food","cooking","cook","grill","kitchen","snack"],
  ["travel","portable","compact","carry"]
];

function normalizeText(text){
  return String(text || "").toLowerCase().replace(/[^a-z0-9 ]/g," ");
}

function getSearchWords(query){
  query = normalizeText(query);
  let words = query.split(/\s+/).filter(Boolean);
  let expanded = new Set(words);

  words.forEach(word => {
    synonymGroups.forEach(group => {
      if(group.includes(word)){
        group.forEach(similar => expanded.add(similar));
      }
    });
  });

  return Array.from(expanded);
}

function getProductCategories(product){
  if(Array.isArray(product.categories)){
    return product.categories;
  }

  if(product.category){
    return [product.category];
  }

  return [];
}

function productSearchText(product){
  return normalizeText([
    product.name,
    product.description,
    product.keywords,
    ...getProductCategories(product)
  ].join(" "));
}

function matchesSearch(product, query){
  if(!query.trim()){
    return true;
  }

  const searchWords = getSearchWords(query);
  const text = productSearchText(product);

  return searchWords.some(word => text.includes(word));
}

function matchesCategory(product, category){
  if(category === "All"){
    return true;
  }

  return getProductCategories(product).includes(category);
}

function renderCategoryDropdown(){
  const dropdown = document.getElementById("categoryFilter");
  dropdown.innerHTML = `<option value="All">All Categories</option>`;

  categories.forEach(cat => {
    dropdown.innerHTML += `<option value="${cat}">${cat}</option>`;
  });
}

function renderProducts(){
  const grid = document.getElementById("productGrid");
  const selectedCategory = document.getElementById("categoryFilter").value || "All";
  const searchQuery = document.getElementById("searchInput").value || "";

  const filteredProducts = products.filter(product => {
    return matchesCategory(product, selectedCategory) && matchesSearch(product, searchQuery);
  });

  grid.innerHTML = "";

  if(filteredProducts.length === 0){
    grid.innerHTML = `
      <div class="empty">
        <h3>No products found</h3>
        <p>Try searching a different word or choose another category.</p>
      </div>
    `;
    return;
  }

  filteredProducts.forEach(product => {
    const productCategories = getProductCategories(product);

    grid.innerHTML += `
      <div class="card">
        <img src="${product.image || ''}" onerror="this.style.display='none'">
        <h3>${product.name}</h3>

        <div class="tags">
          ${productCategories.map(cat => `<span class="tag">${cat}</span>`).join("")}
        </div>

        <p>${product.description || ""}</p>
        <div class="price">$${product.price}</div>
        <br>
        <button onclick="addToCart(${product.id})">Add to Cart</button>
      </div>
    `;
  });
}

function clearFilters(){
  document.getElementById("searchInput").value = "";
  document.getElementById("categoryFilter").value = "All";
  renderProducts();
  window.scrollTo({top:0,behavior:"smooth"});
}

function addToCart(id){
  const product = products.find(p => p.id === id);

  if(!product){
    return;
  }

  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function renderCart(){
  document.getElementById("cartCount").textContent = cart.length;

  const cartItems = document.getElementById("cartItems");
  cartItems.innerHTML = "";

  let total = 0;

  cart.forEach((item, index) => {
    total += Number(item.price) || 0;

    cartItems.innerHTML += `
      <div class="cartItem">
        <strong>${item.name}</strong>
        <div class="small">$${item.price}</div>
        <button onclick="removeFromCart(${index})">Remove</button>
      </div>
    `;
  });

  document.getElementById("cartTotal").textContent = total.toFixed(2);
}

function removeFromCart(index){
  cart.splice(index,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function toggleCart(){
  const box = document.getElementById("cartBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

function checkout(){
  if(cart.length === 0){
    alert("Your cart is empty.");
    return;
  }

  alert("Checkout coming soon!");
}

renderCategoryDropdown();
renderProducts();
renderCart();
</script>

</body>
</html>
