<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Moonwave</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#07111f;
  color:white;
  overflow-x:hidden;
}
#landing{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at top,#1d3557,#07111f 70%);
}
.logo{
  font-size:42px;
  font-weight:900;
  letter-spacing:2px;
  margin-bottom:35px;
}
.moon{
  width:230px;
  height:230px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fff,#d8d8d8 55%,#aaa);
  box-shadow:0 0 80px rgba(255,255,255,.7);
  cursor:pointer;
  transition:.25s;
}
.moon:hover{
  transform:scale(1.06);
}
.clickText{
  margin-top:30px;
  color:#cfe8ff;
  font-size:18px;
}
.wave{
  position:fixed;
  left:0;
  bottom:-120%;
  width:100%;
  height:120%;
  background:linear-gradient(180deg,#3ddcff,#0b70ff,#053b7a);
  z-index:99;
  border-radius:50% 50% 0 0;
  transition:bottom 1.2s ease-in-out;
}
.wave.active{
  bottom:0;
}
#shopPage{
  display:none;
  background:#f5f7fb;
  color:#111;
  min-height:100vh;
}
header{
  padding:22px 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#07111f;
  color:white;
  position:sticky;
  top:0;
  z-index:20;
}
nav{
  display:flex;
  gap:12px;
  align-items:center;
}
button,select{
  border:0;
  border-radius:12px;
  padding:13px 18px;
  font-weight:900;
  cursor:pointer;
}
button{
  background:#0b70ff;
  color:white;
}
select{
  background:white;
  color:#111;
}
.hero{
  padding:55px 8%;
  background:linear-gradient(135deg,#07111f,#123a66);
  color:white;
}
.hero h1{
  font-size:58px;
  margin:0 0 12px;
}
.hero p{
  max-width:650px;
  color:#d9ecff;
  font-size:18px;
}
.section{
  padding:40px 8%;
}
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:22px;
}
.card{
  background:white;
  border-radius:20px;
  padding:22px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}
.card h3{
  margin:10px 0;
}
.category{
  font-size:13px;
  color:#0b70ff;
  font-weight:900;
}
.price{
  font-size:24px;
  font-weight:900;
  margin:14px 0;
}
.cartPanel{
  position:fixed;
  right:-380px;
  top:0;
  width:330px;
  height:100%;
  background:white;
  color:#111;
  box-shadow:-10px 0 30px rgba(0,0,0,.25);
  z-index:80;
  padding:25px;
  transition:.3s;
  overflow:auto;
}
.cartPanel.open{
  right:0;
}
.cartItem{
  border-bottom:1px solid #ddd;
  padding:12px 0;
}
footer{
  padding:35px 8%;
  text-align:center;
  background:#07111f;
  color:white;
}
</style>
</head>

<body>

<section id="landing">
  <div class="logo">MOONWAVE</div>
  <div class="moon" onclick="enterShop()"></div>
  <div class="clickText">Click the moon to enter</div>
</section>

<div class="wave" id="wave"></div>

<div id="shopPage">
<header>

    </select>
    <button onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>

</header>

<section class="hero">

<section class="section">
  <div class="products" id="products"></div>
</section>

<footer>© 2026 Moonwave</footer>
</div>

<div class="cartPanel" id="cartPanel">

  <h2>Your Cart</h2>

let cart = [];

function enterShop(){
  document.getElementById("wave").classList.add("active");

  setTimeout(function(){
    document.getElementById("landing").style.display = "none";
    document.getElementById("shopPage").style.display = "block";
    document.body.style.background = "#f5f7fb";
    document.getElementById("wave").style.bottom = "120%";
  },1200);
}

function goHome(){
  document.getElementById("cartPanel").classList.remove("open");
  document.getElementById("shopPage").style.display = "none";
  document.getElementById("landing").style.display = "flex";
  document.body.style.background = "#07111f";

  const wave = document.getElementById("wave");
  wave.classList.remove("active");
  wave.style.bottom = "-120%";
}

function loadCategories(){
  const select = document.getElementById("categorySelect");
  const categories = [...new Set(products.map(p => p.category))];

  categories.forEach(category => {
    const option = document.createElement("option");
    option.value = category;
    option.textContent = category;
    select.appendChild(option);
  });
}

function displayProducts(list){
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach((product,index) => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="category">${product.category}</div>
      <h3>${product.name}</h3>
      <div class="price">$${product.price}</div>
      <button onclick="addToCart('${product.name}')">Add to Cart</button>
    `;
    container.appendChild(card);
  });
}

function filterCategory(){
  const selected = document.getElementById("categorySelect").value;

  if(selected === "All"){
    displayProducts(products);
  }else{
    displayProducts(products.filter(p => p.category === selected));
  }
}

function addToCart(productName){
  const product = products.find(p => p.name === productName);
  cart.push(product);
  updateCart();
}

function updateCart(){
  document.getElementById("cartCount").textContent = cart.length;

  const cartItems = document.getElementById("cartItems");
  cartItems.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    total += item.price;
    const div = document.createElement("div");
    div.className = "cartItem";
    div.innerHTML = `<strong>${item.name}</strong><br>$${item.price}`;
    cartItems.appendChild(div);
  });

  document.getElementById("cartTotal").textContent = total;
}

function toggleCart(){
  document.getElementById("cartPanel").classList.toggle("open");
}

loadCategories();
displayProducts(products);
