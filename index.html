<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Side Quests</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f7f2e8;color:#121212}
header{padding:24px 7%;display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:900;font-size:25px}.logo span{color:#b77912}
.hero{min-height:82vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:0 7%;gap:45px}
h1{font-size:76px;line-height:.9;margin:0 0 20px}
p{font-size:18px;color:#555}
button{background:#121212;color:white;border:0;border-radius:14px;padding:15px 24px;font-weight:900;cursor:pointer}
.vaultBox{display:grid;place-items:center;background:linear-gradient(145deg,#fff,#e9dfcf);border-radius:34px;padding:45px;box-shadow:0 25px 60px #0002}
.lock{width:360px;height:360px;border-radius:50%;position:relative;cursor:pointer;transition:1.1s;box-shadow:0 30px 60px #0005,inset 0 0 35px #0008;background:radial-gradient(circle,#f7f7f7 0 8%,#9aa3a9 9% 18%,#2b333b 19% 31%,#d7dde0 32% 37%,#111820 38% 48%,#69727a 49% 55%,#1a2027 56% 100%);border:20px solid #20262c}
.lock.open{transform:rotate(720deg) scale(.08);opacity:0}
.spoke{position:absolute;top:165px;left:50px;width:260px;height:30px;background:linear-gradient(#e7eef2,#343b42,#111);border-radius:20px;box-shadow:0 4px 10px #0008}
.s2{transform:rotate(45deg)}.s3{transform:rotate(90deg)}.s4{transform:rotate(135deg)}
.center{position:absolute;top:128px;left:128px;width:86px;height:86px;background:radial-gradient(circle,#f8c24a,#9b650b);border:9px solid #171717;border-radius:50%;z-index:5;display:grid;place-items:center;font-size:28px;font-weight:900}
.bolt{position:absolute;width:28px;height:28px;background:radial-gradient(circle,#ffd36b,#996400);border:4px solid #111;border-radius:50%;z-index:6}
.b1{top:18px;left:158px}.b2{top:70px;right:45px}.b3{right:18px;top:158px}.b4{bottom:70px;right:45px}.b5{bottom:18px;left:158px}.b6{left:45px;bottom:70px}.b7{left:18px;top:158px}.b8{left:45px;top:70px}
.products{display:none;padding:45px 7%}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 28px}.chip{background:white;color:#111;border:1px solid #ddd;padding:9px 14px;border-radius:999px;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px}
.card{background:white;border-radius:18px;padding:18px;box-shadow:0 10px 30px #0002}
.icon{font-size:42px}.cat{color:#b77912;font-size:12px;font-weight:900;text-transform:uppercase}.name{font-size:19px;font-weight:900;margin:6px 0}
.desc{font-size:14px;color:#555;min-height:52px}.stats{display:flex;gap:8px;margin-top:12px}.stat{background:#f1f1f1;border-radius:10px;padding:8px;flex:1;font-size:12px}.stat b{display:block}
@media(max-width:800px){.hero{grid-template-columns:1fr}h1{font-size:48px}.lock{width:290px;height:290px}}
</style>
</head>
<body>

<header>
  <div class="logo"><span>SQ</span> Side Quests</div>
  <button onclick="showProducts()">Store</button>
</header>

<section class="hero" id="hero">
  <div>
    <p><b>50 products loaded</b></p>
    <h1>Open the<br>Side Quest<br>Vault.</h1>
    <p>High-demand, useful, almost must-have products worth testing fast.</p>
    <button onclick="openVault()">Open the Vault</button>
  </div>

  <div class="vaultBox">
    <div class="lock" id="lock" onclick="openVault()">
      <div class="spoke"></div><div class="spoke s2"></div><div class="spoke s3"></div><div class="spoke s4"></div>
      <div class="center">SQ</div>
      <span class="bolt b1"></span><span class="bolt b2"></span><span class="bolt b3"></span><span class="bolt b4"></span>
      <span class="bolt b5"></span><span class="bolt b6"></span><span class="bolt b7"></span><span class="bolt b8"></span>
    </div>
    <br><button onclick="openVault()">Click Vault to Open</button>
  </div>
</section>

<section class="products" id="products">
  <h1>Product Board</h1>
  <div class="filters">
    <button class="chip">All</button><button class="chip">Car</button><button class="chip">Sports</button><button class="chip">Outdoor</button><button class="chip">Home</button><button class="chip">Travel</button>
  </div>
  <div class="grid" id="grid"></div>
</section>

const grid=document.getElementById("grid");
products.forEach(p=>{
let margin=(p[4]-p[5]).toFixed(2);
grid.innerHTML+=`
<div class="card">
  <div class="icon">${p[0]}</div>
  <div class="cat">${p[1]}</div>
  <div class="name">${p[2]}</div>
  <div class="desc">${p[3]}</div>
  <div class="stats">
    <div class="stat">Sell<b>$${p[4]}</b></div>
    <div class="stat">Cost<b>$${p[5]}</b></div>
    <div class="stat">Margin<b>$${margin}</b></div>
  </div>

function openVault(){
 document.getElementById("lock").classList.add("open");
 setTimeout(showProducts,900);
}
function showProducts(){
 document.getElementById("hero").style.display="none";
 document.getElementById("products").style.display="block";
 window.scrollTo(0,0);
}
</script>

</body>
</html>
