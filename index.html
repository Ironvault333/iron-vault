<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iron Vault</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#05080d;color:white}
header{padding:25px 8%;display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:900;font-size:24px;color:#f5b942}
.hero{min-height:85vh;display:grid;grid-template-columns:1fr 1.2fr;align-items:center;padding:0 8%;gap:40px}
h1{font-size:72px;line-height:.9;margin:0 0 20px}
p{color:#b8c2cc;font-size:18px}
button{border:0;border-radius:12px;padding:15px 24px;font-weight:900;cursor:pointer;background:#f5b942;color:#080b10}
.vaultWrap{position:relative}
.vaultImg{width:100%;border-radius:26px;box-shadow:0 0 70px #f5b94255;transition:1s}
.vaultImg.open{transform:scale(1.08);filter:brightness(1.35)}
.openBtn{position:absolute;left:50%;bottom:35px;transform:translateX(-50%)}
.products{display:none;padding:45px 8%}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px}
.card{background:#101923;border:1px solid #263746;border-radius:18px;padding:18px}
.icon{font-size:44px}.name{font-size:19px;font-weight:900}.cat{color:#f5b942;font-size:12px;font-weight:900}
.stats{display:flex;gap:8px;margin-top:12px}.stat{background:#182536;border-radius:10px;padding:8px;flex:1;font-size:12px}
@media(max-width:800px){.hero{grid-template-columns:1fr}h1{font-size:48px}}
</style>
</head>
<body>

<header>
  <div class="logo">IV IRON VAULT</div>
  <button onclick="showProducts()">Store</button>
</header>

<section class="hero" id="hero">
  <div>
    <p>50 products loaded</p>
    <h1>Unlock<br>Iron Vault.</h1>
    <p>Cool products. Strong margins. Built to test fast.</p>
    <button onclick="openVault()">Open the Vault</button>
  </div>

  <div class="vaultWrap">
    <img src="vault.jpg" class="vaultImg" id="vaultImg" alt="Iron Vault">
    <button class="openBtn" onclick="openVault()">Open the Vault</button>
  </div>
</section>

<section class="products" id="products">
  <h1>Product Board</h1>
  <div class="grid" id="grid"></div>
</section>

<script>
const products=[
["🚗","Car","Seat Gap Crumb Catcher","Stops crumbs and phones from falling between seats.",24.99,6.80],
["👟","Sports","QuickDry Shoe Dryer","Dryer for cleats, boots, and sneakers.",49.99,18.50],
["💡","Backyard","Glow Boundary Kit","Light-up strips for driveway games.",59.99,19.00],
["🏓","Sports","Portable Pickleball Net","Fast-set driveway pickleball net.",89.99,34.00],
["🥤","Nice-To-Have","Magnetic Cup Holder Clip","Clip-on drink holder for chairs and carts.",22.99,5.20],
["🔥","Camping","Fire Pit Color Packs","Color packs for backyard fire pits.",19.99,4.50],
["🧊","Outdoor","Cooler Shade Clip","Clip-on shade for coolers and chairs.",24.99,4.75],
["🧰","Travel","Cord Snap Labels","Labels for chargers, hoses, and cords.",14.99,2.80]
];

const grid=document.getElementById("grid");
products.forEach(p=>{
let margin=(p[4]-p[5]).toFixed(2);
grid.innerHTML+=`
<div class="card">
  <div class="icon">${p[0]}</div>
  <div class="cat">${p[1]}</div>
  <div class="name">${p[2]}</div>
  <p>${p[3]}</p>
  <div class="stats">
    <div class="stat">Sell<br><b>$${p[4]}</b></div>
    <div class="stat">Cost<br><b>$${p[5]}</b></div>
    <div class="stat">Margin<br><b>$${margin}</b></div>
  </div>
</div>`;
});

function openVault(){
 document.getElementById("vaultImg").classList.add("open");
 setTimeout(showProducts,900);
}
function showProducts(){
 document.getElementById("hero").style.display="none";
 document.getElementById("products").style.display="block";
 window.scrollTo(0,0);
}
</script>

</body>
</html>
