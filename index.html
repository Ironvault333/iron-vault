<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Iron Vault</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#faf7f0;
  color:#111;
}
header{
  padding:22px 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#faf7f0;
  position:sticky;
  top:0;
  z-index:10;
}
.logo{
  font-weight:900;
  font-size:26px;
}
.nav{
  display:flex;
  gap:12px;
  align-items:center;
}
select,button{
  background:#111;
  color:white;
  border:0;
  border-radius:12px;
  padding:13px 18px;
  font-weight:900;
  cursor:pointer;
}
.hero{
  min-height:70vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  padding:0 8%;
  gap:40px;
}
h1{
  font-size:72px;
  line-height:.9;
  margin:0 0 20px;
}
p{
  font-size:18px;
  color:#555;
}
.vaultBox{
  display:grid;
  place-items:center;
}
.vault{
  width:330px;
  height:330px;
  border-radius:50%;
  background:radial-gradient(circle,#555,#111 60%,#000);
  box-shadow:0 30px 70px rgba(0,0,0,.35);
  display:grid;
  place-items:center;
  border:18px solid #222;
}
.vaultInner{
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle,#888,#222);
  border:10px solid #111;
  display:grid;
  place-items:center;
  color:white;
  font-weight:900;
  font-size:28px;
}
.section{
  padding:50px 8%;
}
.section h2{
  font-size:42px;
  margin:0 0 25px;
}
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:22px;
}
.card{
  background:white;
  border-radius:20px;
  padding:22px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}
.card h3{
  margin:0 0 10px;
  font-size:20px;
}
.category{
  font-size:13px;
  color:#777;
  font-weight:900;
  text-transform:uppercase;
}
.price{
  font-size:24px;
  font-weight:900;
  margin:14px 0;
}
.cartPanel{
  position:fixed;
  right:-380px;
  top:0;
  width:330px;
  height:100%;
  background:white;
  box-shadow:-10px 0 30px rgba(0,0,0,.2);
  z-index:50;
  padding:25px;
  transition:.3s;
  overflow:auto;
}
.cartPanel.open{
  right:0;
}
.cartItem{
  border-bottom:1px solid #ddd;
  padding:12px 0;
}
.closeCart{
  background:#ddd;
  color:#111;
  margin-bottom:15px;
}
footer{
  padding:40px 8%;
  text-align:center;
  color:#777;
}
@media(max-width:800px){
  .hero{
    grid-template-columns:1fr;
    padding-top:40px;
  }
  h1{
    font-size:52px;
  }
  .vault{
    width:240px;
    height:240px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">Iron Vault</div>
  <div class="nav">
    <button onclick="showHome()">Home</button>
    <select id="categorySelect" onchange="filterCategory()">

    </select>
    <button onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
  </div>
</header>

<section class="hero" id="home">
  <div>
    <h1>Unlock Better Finds</h1>

    <button onclick="scrollToProducts()">Shop Products</button>
  </div>
  <div class="vaultBox">
    <div class="vault">
      <div class="vaultInner">VAULT</div>
    </div>
  </div>
</section>

<section class="section" id="shop">
  <h2>Products</h2>
  <div class="products" id="products"></div>
</section>

<div class="cartPanel" id="cartPanel">
  <button class="closeCart" onclick="toggleCart()">Close</button>
  <h2>Your Cart</h2>
  <div id="cartItems"></div>

<footer>

let cart = [];

function loadCategories(){
  const select = document.getElementById("categorySelect");
  const categories = [...new Set(products.map(p => p.category))];

  categories.forEach(category => {
    const option = document.createElement("option");
    option.value = category;
    option.textContent = category;
    select.appendChild(option);
  });
}

function displayProducts(list){
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach((product,index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="category">${product.category}</div>
      <h3>${product.name}</h3>
      <div class="price">$${product.price}</div>
      <button onclick="addToCart(${index})">Add to Cart</button>
    `;

    container.appendChild(card);
  });
}

function filterCategory(){
  const selected = document.getElementById("categorySelect").value;

  if(selected === "All"){
    displayProducts(products);
  }else{
    const filtered = products.filter(product => product.category === selected);
    displayProducts(filtered);
  }
}

function addToCart(index){
  const selectedCategory = document.getElementById("categorySelect").value;
  let currentList = products;

  if(selectedCategory !== "All"){
    currentList = products.filter(product => product.category === selectedCategory);
  }

  cart.push(currentList[index]);
  updateCart();
}

function updateCart(){
  document.getElementById("cartCount").textContent = cart.length;

  const cartItems = document.getElementById("cartItems");
  cartItems.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    total += item.price;

    const div = document.createElement("div");
    div.className = "cartItem";
    div.innerHTML = `<strong>${item.name}</strong><br>$${item.price}`;
    cartItems.appendChild(div);
  });

  document.getElementById("cartTotal").textContent = total;
}

function toggleCart(){
  document.getElementById("cartPanel").classList.toggle("open");
}

function scrollToProducts(){
  document.getElementById("shop").scrollIntoView({behavior:"smooth"});
}

function showHome(){
  document.getElementById("home").scrollIntoView({behavior:"smooth"});
}

loadCategories();
displayProducts(products);
