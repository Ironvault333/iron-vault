<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Side Quests</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#f7efe6;color:#111}
header{height:58px;background:#080b10;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 8%;box-sizing:border-box;position:sticky;top:0;z-index:50}
.logo{font-size:25px;font-weight:900}
nav{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
nav a,nav button{color:white;background:none;border:0;font-weight:800;cursor:pointer;text-decoration:none}
select,input{padding:9px 12px;border-radius:10px;border:1px solid #ccc;font-size:14px}
.searchBox{display:none;width:210px}

.hero{min-height:calc(100vh - 58px);display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:0 8%;box-sizing:border-box}
h1{font-size:58px;line-height:.9;margin:0 0 18px}
p{color:#555;font-size:16px;line-height:1.5}
.yellowBtn{background:#ffc400;color:#111;border:0;border-radius:999px;padding:14px 28px;font-weight:900;cursor:pointer}
.yellowBtn:hover{opacity:.85}

.vaultWrap{display:flex;justify-content:center}
.vault{width:340px;height:340px;background:linear-gradient(145deg,#c7ccd1,#525a63);border-radius:28px;display:grid;place-items:center;box-shadow:0 25px 60px rgba(0,0,0,.28);cursor:pointer;perspective:900px}
.door{width:240px;height:240px;background:linear-gradient(145deg,#9aa4ae,#3c4650);border-radius:18px;border:18px solid #636d77;position:relative;box-shadow:inset 0 0 28px rgba(0,0,0,.35);transition:transform 1s ease,opacity 1s ease;transform-origin:left center}
.vault.open .door{transform:rotateY(-105deg);opacity:.75}
.handle{width:82px;height:82px;border-radius:50%;background:radial-gradient(circle,#f1ead7,#5b6570);position:absolute;top:79px;left:79px;box-shadow:0 4px 12px rgba(0,0,0,.35)}
.handle:before{content:"";position:absolute;width:124px;height:14px;background:#46515c;top:34px;left:-21px;border-radius:8px;box-shadow:0 -39px 0 #46515c,0 39px 0 #46515c;transform:rotate(45deg)}
.bolt{width:17px;height:17px;background:radial-gradient(circle,#e9eef2,#6b747d);border-radius:50%;position:absolute;box-shadow:inset 0 0 5px #222}
.b1{top:22px;left:22px}.b2{top:22px;right:22px}.b3{bottom:22px;left:22px}.b4{bottom:22px;right:22px}.b5{top:104px;left:22px}.b6{top:104px;right:22px}

.productsPage{display:none;padding:45px 8%}
.productsTop{display:flex;justify-content:space-between;align-items:center;gap:15px;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:22px;margin-top:25px}
.card{background:white;border-radius:18px;padding:18px;box-shadow:0 8px 25px rgba(0,0,0,.08);transition:.2s}
.card:hover{transform:translateY(-5px)}
.card img{width:100%;height:170px;object-fit:cover;border-radius:14px;background:#eee}
.price{font-size:20px;font-weight:900}
.tag{display:inline-block;background:#eee;border-radius:999px;padding:5px 9px;font-size:12px;margin:3px}
.empty{background:white;border-radius:18px;padding:25px}

.cartBox{position:fixed;right:25px;bottom:25px;background:white;border-radius:18px;padding:18px;width:300px;max-height:70vh;overflow:auto;box-shadow:0 8px 30px rgba(0,0,0,.18);display:none;z-index:100}
.cartItem{border-bottom:1px solid #ddd;padding:9px 0}
.cartItem button{margin-top:6px;background:#111;color:white;border:0;border-radius:8px;padding:7px 10px;cursor:pointer}

@media(max-width:850px){
header{height:auto;padding:18px 8%;flex-direction:column;align-items:flex-start;gap:14px}
.hero{grid-template-columns:1fr;padding-top:50px;gap:35px}
h1{font-size:46px}
.searchBox{width:100%}
nav,nav select{width:100%}
}
</style>
</head>

<body>

<header>
  <div class="logo">Side Quests</div>
  <nav>
    <a href="#" onclick="goHome()">Home</a>
    <button onclick="openProducts()">Products</button>
    <input class="searchBox" id="searchInput" placeholder="Search products..." oninput="renderProducts()">
    <select id="categoryFilter" onchange="renderProducts()"></select>
    <button onclick="toggleCart()">Cart: <span id="cartCount">0</span></button>
  </nav>
</header>

<section class="hero" id="homePage">
  <div>
    <h1>Better. Faster.<br>Stronger. Products.</h1>
    <p>Useful, clever, almost-need-to-have products for home, kitchen, pets, car, travel, cleaning, and everyday upgrades.</p>
    <button class="yellowBtn" onclick="animateVault()">Open Vault</button>
  </div>

  <div class="vaultWrap">
    <div class="vault" id="vault" onclick="animateVault()">
      <div class="door">
        <div class="bolt b1"></div><div class="bolt b2"></div><div class="bolt b3"></div>
        <div class="bolt b4"></div><div class="bolt b5"></div><div class="bolt b6"></div>
        <div class="handle"></div>
      </div>
    </div>
  </div>
</section>

<section class="productsPage" id="productsPage">
  <div class="productsTop">
    <h2>Products</h2>
  </div>
  <div id="productGrid" class="grid"></div>
</section>

<div class="cartBox" id="cartBox">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <h3>Total: $<span id="cartTotal">0.00</span></h3>
  <button class="yellowBtn" onclick="checkout()">Checkout</button>
</div>

let products=Array.isArray(savedProducts)&&savedProducts.length?savedProducts:defaultProducts;
let cart=JSON.parse(localStorage.getItem("cart"))||[];

["cleaning","clean","cleaner","supplies","supply","product","products","scrub","wash","washing","brush","soap","sanitize","sanitizer","dust","odor","fresh"],
["water","pool","swim","swimming","floating","float","lake","beach","splash"],

function animateVault(){
  document.getElementById("vault").classList.add("open");
  setTimeout(openProducts,900);
}

function goHome(){
  window.history.pushState(null,"","index.html");
  document.getElementById("vault").classList.remove("open");
  showHomePage();
}

function openProducts(){
  window.history.pushState(null,"","index.html?page=products");
  showProductsPage();
}

function showProductsPage(){
  document.getElementById("homePage").style.display="none";
  document.getElementById("productsPage").style.display="block";
  document.getElementById("searchInput").style.display="inline-block";
  renderProducts();
}

function showHomePage(){
  document.getElementById("homePage").style.display="grid";
  document.getElementById("productsPage").style.display="none";
  document.getElementById("searchInput").style.display="none";
}

function renderCategories(){
  let dropdown=document.getElementById("categoryFilter");
  dropdown.innerHTML='<option value="All">All Categories</option>';
  categories.forEach(cat=>dropdown.innerHTML+=`<option value="${cat}">${cat}</option>`);
}

function normalizeText(text){
  return String(text||"").toLowerCase().replace(/[^a-z0-9 ]/g," ");
}

function expandSearch(query){
  let words=normalizeText(query).split(/\s+/).filter(Boolean);
  let expanded=new Set(words);
  words.forEach(word=>{
    synonyms.forEach(group=>{
      if(group.includes(word)) group.forEach(similar=>expanded.add(similar));
    });
  });
  return Array.from(expanded);
}

function getProductCategories(product){
  if(Array.isArray(product.categories)) return product.categories;
  if(product.category) return [product.category];
  return [];
}

function productText(product){
  return normalizeText([product.name,product.description,product.keywords,getProductCategories(product).join(" ")].join(" "));
}

function renderProducts(){
  let grid=document.getElementById("productGrid");
  let selectedCategory=document.getElementById("categoryFilter").value||"All";
  let searchQuery=document.getElementById("searchInput").value||"";
  let searchWords=expandSearch(searchQuery);

  let filtered=products.filter(product=>{
    let cats=getProductCategories(product);
    let catMatch=selectedCategory==="All"||cats.includes(selectedCategory);
    let text=productText(product);
    let searchMatch=!searchQuery.trim()||searchWords.some(word=>text.includes(word));
    return catMatch&&searchMatch;
  });

  grid.innerHTML="";

  if(filtered.length===0){
    grid.innerHTML='<div class="empty"><h3>No products found</h3><p>Try a different search word or category.</p></div>';
    return;
  }

  filtered.forEach(product=>{
    let cats=getProductCategories(product);
    grid.innerHTML+=`
      <div class="card">
        <img src="${product.image||''}" onerror="this.style.display='none'">
        <h3>${product.name}</h3>
        <div>${cats.map(cat=>`<span class="tag">${cat}</span>`).join("")}</div>
        <p>${product.description||""}</p>
        <div class="price">$${product.price}</div><br>
        <button class="yellowBtn" onclick="addToCart(${product.id})">Add to Cart</button>
      </div>`;
  });
}

function addToCart(id){
  let product=products.find(item=>item.id===id);
  if(!product) return;
  let existing=cart.find(item=>item.id===id);
  if(existing){existing.quantity+=1}
  else{cart.push({id:product.id,name:product.name,price:product.price,quantity:1})}
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

function renderCart(){
  document.getElementById("cartCount").textContent=cart.reduce((sum,item)=>sum+(item.quantity||1),0);
  let cartItems=document.getElementById("cartItems");
  let total=0;
  cartItems.innerHTML="";
  if(cart.length===0) cartItems.innerHTML="<p>Your cart is empty.</p>";
  cart.forEach((item,index)=>{
    let qty=item.quantity||1;
    total+=Number(item.price)*qty;
    cartItems.innerHTML+=`
      <div class="cartItem">
        <strong>${item.name}</strong>
        <p>Qty: ${qty}</p>
        <p>$${item.price} each</p>
        <button onclick="changeQty(${index},1)">+</button>
        <button onclick="changeQty(${index},-1)">-</button>
        <button onclick="removeFromCart(${index})">Remove</button>
      </div>`;
  });
  document.getElementById("cartTotal").textContent=total.toFixed(2);
}

function changeQty(index,amount){
  cart[index].quantity=(cart[index].quantity||1)+amount;
  if(cart[index].quantity<=0) cart.splice(index,1);
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

function removeFromCart(index){
  cart.splice(index,1);
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

function toggleCart(){
  let box=document.getElementById("cartBox");
  box.style.display=box.style.display==="block"?"none":"block";
}

function checkout(){
  if(cart.length===0){alert("Your cart is empty.");return}
  alert("Checkout coming soon!");
}

renderCategories();
renderCart();

if(window.location.href.includes("page=products")) showProductsPage();
else showHomePage();
</script>

</body>
</html>
