<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Side Quest</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f7f1e8;
  color:#111;
}
header{
  padding:24px 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{
  font-size:30px;
  font-weight:900;
}
nav a{
  margin-left:22px;
  text-decoration:none;
  color:#333;
  font-weight:800;
}
.hero{
  min-height:86vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px;
  align-items:center;
  padding:20px 8% 60px;
}
h1{
  font-size:78px;
  line-height:.9;
  margin:0 0 22px;
  letter-spacing:-4px;
}
p{
  font-size:19px;
  color:#555;
  line-height:1.55;
}
button{
  background:#111;
  color:white;
  border:0;
  border-radius:14px;
  padding:16px 26px;
  font-weight:900;
  cursor:pointer;
  font-size:16px;
  margin-top:16px;
}

/* VAULT */
.vault-wrap{
  perspective:1000px;
  display:flex;
  justify-content:center;
}
.vault-box{
  position:relative;
  width:450px;
  height:450px;
  cursor:pointer;
}
.vault-door{
  position:absolute;
  inset:0;
  border-radius:50%;
  background:radial-gradient(circle at 35% 25%,#8b8b8b,#242424 45%,#050505 80%);
  border:18px solid #151515;
  box-shadow:inset 0 0 45px #000,0 30px 70px rgba(0,0,0,.35);
  transform-origin:left center;
  transition:1.2s ease;
  z-index:5;
}
.vault-box.open .vault-door{
  transform:rotateY(-115deg);
}
.vault-inside{
  position:absolute;
  inset:25px;
  border-radius:50%;
  background:radial-gradient(circle,#ffd45a,#8b5d00 45%,#1d1200 75%);
  box-shadow:inset 0 0 70px #000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  font-weight:900;
  color:white;
  text-shadow:0 3px 12px #000;
}
.vault-door:before{
  content:"";
  position:absolute;
  inset:34px;
  border-radius:50%;
  border:12px solid #4b4b4b;
}
.bolt{
  position:absolute;
  width:34px;
  height:34px;
  background:linear-gradient(#aaa,#222);
  border-radius:50%;
  border:3px solid #111;
}
.b1{top:35px;left:205px}.b2{bottom:35px;left:205px}
.b3{left:35px;top:205px}.b4{right:35px;top:205px}
.b5{top:90px;left:90px}.b6{top:90px;right:90px}
.b7{bottom:90px;left:90px}.b8{bottom:90px;right:90px}
.handle{
  position:absolute;
  width:180px;
  height:180px;
  border-radius:50%;
  border:15px solid #777;
  top:135px;
  left:135px;
}
.handle span{
  position:absolute;
  width:160px;
  height:17px;
  background:linear-gradient(90deg,#222,#aaa,#222);
  top:66px;
  left:-5px;
  border-radius:20px;
}
.handle span:nth-child(2){transform:rotate(60deg)}
.handle span:nth-child(3){transform:rotate(-60deg)}
.center{
  position:absolute;
  width:65px;
  height:65px;
  border-radius:50%;
  background:radial-gradient(circle,#bbb,#222);
  top:55px;
  left:55px;
  border:5px solid #111;
}

/* PRODUCT PAGE */
section{
  padding:60px 8%;
}
.section-title{
  font-size:48px;
  margin:0 0 10px;
}
.grid{
  margin-top:35px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:22px;
}
.card{
  background:white;
  border-radius:22px;
  padding:22px;
  box-shadow:0 18px 38px rgba(0,0,0,.08);
}
.num{
  background:#111;
  color:white;
  width:38px;
  height:38px;
  display:grid;
  place-items:center;
  border-radius:50%;
  font-weight:900;
  margin-bottom:14px;
}
.card h3{margin:0 0 8px}
.card p{font-size:15px;margin:0}
.tag{
  display:inline-block;
  margin-top:14px;
  padding:7px 11px;
  background:#f0eadf;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}
.hidden{display:none}

@media(max-width:900px){
  .hero{grid-template-columns:1fr;text-align:center}
  h1{font-size:56px}
  .vault-box{width:330px;height:330px}
  .handle{width:135px;height:135px;top:97px;left:97px}
  .handle span{width:120px;top:48px}
  .center{width:50px;height:50px;top:38px;left:38px}
}
</style>
</head>

<body>

<header>
  <div class="logo">Side Quest</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="index.html?page=ideas">Ideas</a>
  </nav>
</header>

<main id="homePage">
  <div class="hero">
    <div>
      <h1>Find Your Next Big Idea.</h1>
      <p>
        Side Quest is a vault of clever product ideas — useful, fun, simple,
        and made to feel like something people would actually buy.
      </p>
      <button onclick="goToIdeas()">Open Vault</button>
    </div>

    <div class="vault-wrap">
      <div class="vault-box" onclick="openVault()">
        <div class="vault-inside">SIDE QUEST</div>
        <div class="vault-door">
          <div class="bolt b1"></div><div class="bolt b2"></div>
          <div class="bolt b3"></div><div class="bolt b4"></div>
          <div class="bolt b5"></div><div class="bolt b6"></div>
          <div class="bolt b7"></div><div class="bolt b8"></div>
          <div class="handle">
            <span></span><span></span><span></span>
            <div class="center"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<main id="ideasPage" class="hidden">
  <section>
    <h2 class="section-title">50 Side Quest Product Ideas</h2>
    <p>Simple products that feel useful, cool, and easy to understand.</p>
    <div class="grid" id="productGrid"></div>
  </section>
</main>

<script>
function openVault(){
  document.querySelector(".vault-box").classList.add("open");
  setTimeout(()=>goToIdeas(),1200);
}

function goToIdeas(){
  window.location.href = "index.html?page=ideas";
}

const products = [
["CrumbGuard Plate","A plate rim that catches crumbs before they fall on couches, laps, or car seats.","Essential"],
["Snack Seat Catcher","A soft tray that fills the car-seat gap so snacks and toys don’t disappear.","Parent Hack"],
["Trash Bag Lock Ring","A ring that locks trash bags to the can so they never slide inside.","Home"],
["SoapGlow Bar","A soap bar that softly glows when wet to make kids want to wash their hands.","Fun"],
["Cord Snap Label","A cord wrap with a built-in label for hoses, chargers, and extension cords.","Garage"],
["Sink Splash Shield","A folding clear shield that blocks water from splashing behind sinks.","Home"],
["Pet Hair Swipe Glove","A rubber glove that pulls pet hair from couches and car seats fast.","Pets"],
["Milk Pour Clip","A snap-on spout that helps kids pour milk without spilling.","Kitchen"],
["Lost Sock Cage","A washer-safe mesh cage that keeps tiny socks together.","Laundry"],
["Remote Finder Dock","A weighted dock that keeps remotes standing upright and easy to find.","Living Room"],

["Tape End Finder","A tiny reusable clip that marks the end of tape rolls forever.","Essential"],
["Plug Pull Tabs","Add-on pull tabs for plugs stuck behind couches, beds, and desks.","Essential"],
["Freezer Flat Pack","A tray that freezes soup and leftovers into thin stackable bricks.","Kitchen"],
["Counter Peel Catcher","A collapsible counter bin for peels, shells, and food scraps.","Kitchen"],
["Lunchbox Cold Wall","A freezer panel that clips inside lunchboxes without taking up much space.","School"],
["Pan Handle Cool Clip","A silicone grip that snaps onto hot pan handles while cooking.","Kitchen"],
["Shoe Mud Edge Mat","A mat with side bristles that cleans shoe edges, not just bottoms.","Outdoor"],
["Door Ding Bumper","A soft wall strip that protects car doors inside tight garages.","Garage"],
["Furniture Slider Socks","Stretchy padded socks for chair legs that slide quietly and stay on.","Home"],
["Cable Drop Net","An under-desk net that catches chargers before they fall behind furniture.","Office"],

["Beach Sand Pocket Blanket","A beach blanket with fillable sand pockets instead of stakes.","Beach"],
["Floating Phone Pillow","A soft floating waterproof phone holder for pools and lakes.","Pool"],
["Cooler Divider Pro","Adjustable cooler dividers for drinks, snacks, ice, and dry items.","Outdoor"],
["Pop-Up Shade Cup","A cup with a tiny folding shade to keep drinks cooler outside.","Fun"],
["Glow Path Pebbles","Solar garden stones that look normal by day and glow at night.","Outdoor"],
["Table Edge Cup Rail","A clip-on drink rail for folding tables at parties or tailgates.","Party"],
["Magnetic Snack Stadium","Magnetic snack bowls that lock together for movies and parties.","Party"],
["Backyard Score Tower","A portable scorekeeper for cornhole, pickleball, and yard games.","Game"],
["Campfire Color Rocks","Reusable fire-safe rocks that create fun color effects in fire pits.","Outdoor"],
["Cam Jam Toss","A backyard game where players toss soft discs into adjustable target nets.","Game"],

["Hose Kink Blocker","A flexible sleeve that stops hoses from folding near the faucet.","Outdoor"],
["Paint Pour Guard","A snap-on rim that stops paint from dripping down the can.","DIY"],
["Screw Starter Pad","A sticky reusable pad that holds tiny screws upright while drilling.","DIY"],
["Tool Shadow Stickers","Peel-and-stick outlines showing where each tool belongs.","Garage"],
["Ladder Foot Grips","Clip-on rubber feet that help ladders grip driveways and decks.","Safety"],
["Pantry Expire Tags","Simple color tags that show what food should be used first.","Kitchen"],
["Bagel Butter Wheel","A rolling butter tool that spreads evenly inside bagels and toast grooves.","Kitchen"],
["Microwave Steam Guard","A reusable cover that vents steam without dripping on food.","Kitchen"],
["Drawer No-Jam Divider","Flexible dividers that bend around odd-shaped kitchen tools.","Kitchen"],
["Snack Lock Box","A timer snack container for simple portion control.","Parent Hack"],

["Toothpaste Flat Roller","A satisfying clip roller that squeezes toothpaste perfectly flat.","Bathroom"],
["Shower Steam Shelf","A shower shelf that gently warms shaving cream or face wash.","Bathroom"],
["Pillow Cool Strip","A reusable cooling strip that slides into a pillowcase.","Sleep"],
["Backseat Trash Dock","A mini trash bin that locks to car floor mats and won’t tip.","Car"],
["Grocery Grip Clip","A padded handle that combines grocery bags so they’re easier to carry.","Essential"],
["No-Spill Cereal Bowl","A bowl with a raised wall that stops cereal milk from sloshing out.","Parent Hack"],
["Fridge Fresh Clip","A food-container clip that reminds you how old leftovers are.","Kitchen"],
["Corner Dust Magnet","A bendable cleaning pad made for baseboard corners and stairs.","Cleaning"],
["Garage Parking Mat","A tire-stop mat that helps cars park perfectly every time.","Garage"],
["Measuring Cup Funnel Lid","A lid that turns a measuring cup into a no-mess funnel.","Kitchen"]
];

const grid = document.getElementById("productGrid");
products.forEach((p,i)=>{
  grid.innerHTML += `
    <div class="card">
      <div class="num">${i+1}</div>
      <h3>${p[0]}</h3>
      <p>${p[1]}</p>
      <span class="tag">${p[2]}</span>
    </div>
  `;
});

const params = new URLSearchParams(window.location.search);
if(params.get("page")==="ideas"){
  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("ideasPage").classList.remove("hidden");
}
</script>

</body>
</html>
