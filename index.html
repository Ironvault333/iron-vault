<!DOCTYPE html>
<html>
<head>
<title>Side Quests</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial;background:#f3f4f6;color:#111}
header{height:70px;background:#111827;color:white;display:flex;justify-content:space-between;align-items:center;padding:0 6%;position:sticky;top:0}
.logo{font-size:28px;font-weight:900}
button{cursor:pointer;border:0;font-weight:900}
nav button{background:transparent;color:white;margin-left:18px}
.hero{min-height:calc(100vh - 70px);display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:50px 6%;gap:40px;background:linear-gradient(135deg,#f7efe3,#d6d9dd)}
h1{font-size:70px;line-height:.9;margin:0 0 20px}
.openBtn{background:#f5c542;padding:16px 28px;border-radius:999px}
.vault{height:430px;background:linear-gradient(135deg,#9ca3af,#374151);border-radius:35px;display:grid;place-items:center;box-shadow:inset 0 0 50px #111,0 30px 60px #999}
.vaultDoor{width:300px;height:340px;background:linear-gradient(135deg,#e5e7eb,#64748b,#1f2937);border:16px solid #6b7280;border-radius:22px;display:grid;place-items:center;transition:1s}
.vault.open .vaultDoor{transform:rotateY(-75deg)}
.wheel{width:140px;height:140px;border-radius:50%;border:18px solid #d1d5db}
.page{display:none;padding:35px 5%}
.show{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:22px}
.card{background:white;border:1px solid #ddd;border-radius:14px;padding:14px;cursor:pointer}
.card img,.placeholder{width:100%;height:190px;border-radius:10px;object-fit:cover;background:#dbe1e8;display:grid;place-items:center;text-align:center;font-weight:900;color:#475569}
.price{font-size:24px;font-weight:900;margin:10px 0}
.detail{display:grid;grid-template-columns:1fr 1fr 300px;gap:25px}
.box{background:white;border:1px solid #ddd;border-radius:14px;padding:20px}
.mainImg{width:100%;height:420px;object-fit:cover;border-radius:12px;background:#ddd}
.thumbs{display:flex;gap:10px;margin-top:10px}
.thumbs img{width:75px;height:75px;object-fit:cover;border-radius:8px;cursor:pointer}
.add{width:100%;padding:15px;background:#ffd814;border-radius:999px;margin-top:15px}
.buy{width:100%;padding:15px;background:#f5a623;border-radius:999px;margin-top:10px}
.similarGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.small{color:#555;font-size:14px}
@media(max-width:900px){.hero,.detail{grid-template-columns:1fr}h1{font-size:52px}}
</style>
</head>
<body>

<header>
  <div class="logo">Side Quests</div>
  <nav>
    <button onclick="showHome()">Home</button>
    <button onclick="showProducts()">Products</button>
  </nav>
  <div>Cart: <span id="cartCount">0</span></div>
</header>

<section class="hero" id="home">
  <div>
    <h1>Better. Faster. Stronger. Products.</h1>
    <p>Useful trending-style products for home, kitchen, pets, car, travel, and everyday upgrades.</p>
    <button class="openBtn" onclick="openVault()">Open Vault</button>
  </div>
  <div class="vault" id="vault" onclick="openVault()">
    <div class="vaultDoor"><div class="wheel"></div></div>
  </div>
</section>

<main class="page" id="productsPage">
  <h2>Products</h2>
  <div class="grid" id="productGrid"></div>
</main>

<main class="page" id="detailPage"></main>

<main class="page" id="cartPage">
  <div class="box">
    <h2>Your Cart</h2>
    <p id="cartText">Your cart is empty.</p>
  </div>
</main>

<script>
let cart = Number(localStorage.getItem("cartCount") || 0);
document.getElementById("cartCount").innerText = cart;

const starterProducts = [
 {name:"Vegetable Chopper", price:24.99, category:"Kitchen", sizes:"Small, Medium, Large", desc:"Fast chop container for onions, peppers, fruit, and meal prep.", shipping:"Estimated delivery: 5–10 business days."},
 {name:"Mini Bag Sealer", price:9.99, category:"Kitchen", sizes:"Standard", desc:"Portable heat sealer for snack bags, chips, and pantry storage.", shipping:"Estimated delivery: 5–10 business days."},
 {name:"Pet Hair Remover Roller", price:16.99, category:"Pets", sizes:"Standard", desc:"Reusable roller that removes pet hair from couches and clothes.", shipping:"Estimated delivery: 5–10 business days."},
 {name:"Car Gap Organizer", price:19.99, category:"Car", sizes:"Driver Side, Passenger Side", desc:"Organizer that fills the seat gap and holds phone, wallet, and keys.", shipping:"Estimated delivery: 5–10 business days."},
 {name:"Under Sink Organizer", price:25.99, category:"Home", sizes:"1-Tier, 2-Tier", desc:"Sliding shelf organizer for cleaning supplies.", shipping:"Estimated delivery: 5–10 business days."}
];

function getProducts(){
  let saved = localStorage.getItem("sqProducts");
  if(!saved){
    localStorage.setItem("sqProducts", JSON.stringify(starterProducts));
    return starterProducts;
  }
  return JSON.parse(saved);
}

function imgHTML(p){
  if(p.images && p.images[0]) return `<img src="${p.images[0]}">`;
  return `<div class="placeholder">Image coming soon</div>`;
}

function showOnly(id){
  document.getElementById("home").style.display="none";
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
  if(id==="home") document.getElementById("home").style.display="grid";
  else document.getElementById(id).classList.add("show");
  window.scrollTo(0,0);
}

function showHome(){showOnly("home")}
function showProducts(){renderProducts();showOnly("productsPage")}

function openVault(){
  document.getElementById("vault").classList.add("open");
  setTimeout(showProducts,1000);
}

function renderProducts(){
  const products = getProducts();
  document.getElementById("productGrid").innerHTML = products.map((p,i)=>`
    <div class="card" onclick="openProduct(${i})">
      ${imgHTML(p)}
      <h3>${p.name}</h3>
      <p class="small">${p.desc}</p>
      <div class="price">$${Number(p.price).toFixed(2)}</div>
      <b>View product details</b>
    </div>
  `).join("");
}

function openProduct(i){
  const products = getProducts();
  const p = products[i];
  const imgs = p.images || [];
  const similar = products.filter((x,idx)=>idx!==i && x.category===p.category).slice(0,4);

  document.getElementById("detailPage").innerHTML = `
    <button onclick="showProducts()">← Back to Products</button>
    <br><br>

    <div class="detail">
      <div class="box">
        ${imgs[0] ? `<img class="mainImg" id="mainImg" src="${imgs[0]}">` : `<div class="mainImg placeholder">Image coming soon</div>`}
        <div class="thumbs">
          ${imgs.map(src=>`<img src="${src}" onclick="document.getElementById('mainImg').src='${src}'">`).join("")}
        </div>
      </div>

      <div class="box">
        <h2>${p.name}</h2>
        <p>${p.desc}</p>
        <button onclick="likeProduct()">♡ Like</button>

        <h3>Product Information</h3>
        <p><b>Category:</b> ${p.category}</p>
        <p><b>Available Options:</b> ${p.sizes}</p>

        <h3>Shipping Details</h3>
        <p>${p.shipping}</p>

        <h3>Reviews</h3>
        <p>No reviews yet. Be the first to review this product.</p>
      </div>

      <div class="box">
        <div class="price">$${Number(p.price).toFixed(2)}</div>
        <label><b>Option</b></label>
        <select style="width:100%;padding:12px;margin:10px 0">
          ${p.sizes.split(",").map(s=>`<option>${s.trim()}</option>`).join("")}
        </select>
        <label><b>Quantity</b></label>
        <select style="width:100%;padding:12px;margin:10px 0">
          <option>1</option><option>2</option><option>3</option>
        </select>
        <button class="add" onclick="addCart()">Add to Cart</button>
        <button class="buy" onclick="addCart();showCart()">Buy Now</button>
      </div>
    </div>

    <div class="box" style="margin-top:25px">
      <h3>Similar Items</h3>
      <div class="similarGrid">
        ${similar.map(s=>`
          <div class="card">
            ${imgHTML(s)}
            <h4>${s.name}</h4>
            <b>$${Number(s.price).toFixed(2)}</b>
          </div>
        `).join("") || "<p>No similar items yet.</p>"}
      </div>
    </div>
  `;
  showOnly("detailPage");
}

function addCart(){
  cart++;
  localStorage.setItem("cartCount", cart);
  document.getElementById("cartCount").innerText = cart;
}

function showCart(){
  document.getElementById("cartText").innerText = `You have ${cart} item(s) in your cart.`;
  showOnly("cartPage");
}

function likeProduct(){
  alert("Liked!");
}

renderProducts();
</script>

</body>
</html>
