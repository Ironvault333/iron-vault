<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iron Vault</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#faf7f0;color:#111}
header{padding:25px 8%;display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:900;font-size:24px}
.hero{min-height:85vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:0 8%;gap:40px}
h1{font-size:72px;line-height:.9;margin:0 0 20px}
p{font-size:18px;color:#555}
button{background:#111;color:white;border:0;border-radius:12px;padding:15px 24px;font-weight:900;cursor:pointer}
.vaultBox{display:grid;place-items:center}
.lock{width:330px;height:330px;border-radius:50%;background:radial-gradient(circle,#fff 0 10%,#cfd4d8 11% 20%,#4f5963 21% 35%,#111 36% 42%,#bfc6cc 43% 48%,#2d3339 49% 100%);border:18px solid #111;position:relative;box-shadow:0 25px 50px #0004;transition:1s}
.lock.open{transform:rotate(720deg) scale(.2);opacity:0}
.handle{position:absolute;top:140px;left:55px;width:220px;height:48px;background:#111;border-radius:30px;transform:rotate(0deg)}
.handle:before{content:"";position:absolute;left:86px;top:-86px;width:48px;height:220px;background:#111;border-radius:30px}
.center{position:absolute;top:125px;left:125px;width:80px;height:80px;background:#f6b72f;border:8px solid #111;border-radius:50%;z-index:5}
.bolt{position:absolute;width:26px;height:26px;background:#f6b72f;border:4px solid #111;border-radius:50%}
.b1{top:18px;left:145px}.b2{top:65px;right:45px}.b3{right:18px;top:145px}.b4{bottom:65px;right:45px}
.b5{bottom:18px;left:145px}.b6{left:45px;bottom:65px}.b7{left:18px;top:145px}.b8{left:45px;top:65px}
.products{display:none;padding:45px 8%}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px}
.card{background:white;border-radius:18px;padding:18px;box-shadow:0 10px 30px #0002}
.icon{font-size:44px}.cat{color:#b47a00;font-size:12px;font-weight:900}.name{font-size:19px;font-weight:900}
.stats{display:flex;gap:8px;margin-top:12px}.stat{background:#f0f0f0;border-radius:10px;padding:8px;flex:1;font-size:12px}
@media(max-width:800px){.hero{grid-template-columns:1fr}h1{font-size:48px}}
</style>
</head>
<body>

<header>
  <div class="logo">IV Iron Vault</div>
  <button onclick="showProducts()">Store</button>
</header>

<section class="hero" id="hero">
  <div>
    <p>50 products loaded</p>
    <h1>Open the<br>Iron Vault.</h1>
    <p>Cool products. Strong margins. Built to test fast.</p>
    <button onclick="openVault()">Open the Vault</button>
  </div>

  <div class="vaultBox">
    <div class="lock" id="lock" onclick="openVault()">
      <div class="handle"></div>
      <div class="center"></div>
      <span class="bolt b1"></span><span class="bolt b2"></span><span class="bolt b3"></span><span class="bolt b4"></span>
      <span class="bolt b5"></span><span class="bolt b6"></span><span class="bolt b7"></span><span class="bolt b8"></span>
    </div>
    <br>
    <button onclick="openVault()">Click Vault to Open</button>
  </div>
</section>

<section class="products" id="products">
  <h1>Product Board</h1>
  <div class="grid" id="grid"></div>
</section>

<script>
const products=[
["🚗","Car","Seat Gap Crumb Catcher","Stops crumbs and phones from falling between seats.",24.99,6.80],
["👟","Sports","QuickDry Shoe Dryer","Dryer for cleats, boots, and sneakers.",49.99,18.50],
["💡","Backyard","Glow Boundary Kit","Light-up strips for driveway games.",59.99,19.00],
["🏓","Sports","Portable Pickleball Net","Fast-set driveway pickleball net.",89.99,34.00],
["🥤","Nice-To-Have","Magnetic Cup Holder Clip","Clip-on drink holder for chairs and carts.",22.99,5.20],
["🔥","Camping","Fire Pit Color Packs","Color packs for backyard fire pits.",19.99,4.50]
];

const grid=document.getElementById("grid");
products.forEach(p=>{
let margin=(p[4]-p[5]).toFixed(2);
grid.innerHTML+=`
<div class="card">
  <div class="icon">${p[0]}</div>
  <div class="cat">${p[1]}</div>
  <div class="name">${p[2]}</div>
  <p>${p[3]}</p>
  <div class="stats">
    <div class="stat">Sell<br><b>$${p[4]}</b></div>
    <div class="stat">Cost<br><b>$${p[5]}</b></div>
    <div class="stat">Margin<br><b>$${margin}</b></div>
  </div>
</div>`;
});

function openVault(){
 document.getElementById("lock").classList.add("open");
 setTimeout(showProducts,900);
}
function showProducts(){
 document.getElementById("hero").style.display="none";
 document.getElementById("products").style.display="block";
 window.scrollTo(0,0);
}
</script>

</body>
</html>
